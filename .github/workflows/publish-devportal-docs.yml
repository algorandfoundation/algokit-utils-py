# publish-devportal-docs.yml
#
# Copy this file to .github/workflows/publish-devportal-docs.yml
# in your library repo.
#
# Triggers:
#   - Nightly cron: builds from main, upserts 'docs-latest' pre-release
#   - Tag push (v*): builds from tag, attaches to existing release
#   - Manual dispatch: builds from selected ref
#
# Required secrets:
#   - DEVPORTAL_DISPATCH_TOKEN: PAT with repo scope on the devportal repo
#     (used to trigger repository_dispatch for devportal rebuild)
#
# Output: devportal-docs.tar.gz attached to a GitHub Release
#   Contents:
#     content/          - doc pages (guides + API reference)
#     sidebar.json      - serialized sidebar config
#     manifest.json     - metadata (repo, ref, timestamp)

name: Publish DevPortal Docs

on:
  schedule:
    # Nightly at 2:00 AM UTC
    - cron: '0 2 * * *'

  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  publish:
    name: Build and Publish Docs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: pnpm build

      # ---- Package for DevPortal ----

      - name: Prepare dist-devportal
        working-directory: docs
        run: |
          mkdir -p dist-devportal/content

          # Copy all doc content (guides, API, root files like index.mdx).
          # Adjust paths if your Starlight content layout differs.
          find src/content/docs -maxdepth 1 -type f \( -name '*.md' -o -name '*.mdx' \) -exec cp {} dist-devportal/content/ \;
          cp -R src/content/docs/guides dist-devportal/content/ 2>/dev/null || true
          cp -R src/content/docs/api dist-devportal/content/ 2>/dev/null || true

          # Build sidebar.json from sidebar.config.ts
          node build-sidebar-json.mjs

          # Generate manifest
          cat > dist-devportal/manifest.json <<MANIFEST
          {
            "repo": "${{ github.repository }}",
            "ref": "${{ github.sha }}",
            "tag": "${{ github.ref_name }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          MANIFEST

      - name: Create tarball
        working-directory: docs
        run: |
          cd dist-devportal
          tar czf ../devportal-docs.tar.gz .

      # ---- Publish ----

      - name: Determine release tag
        id: release-tag
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=docs-latest" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Upsert docs-latest release (nightly/manual)
        if: steps.release-tag.outputs.prerelease == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: docs-latest
          name: 'Documentation (Latest)'
          body: |
            Rolling pre-release with latest documentation build.
            Updated: ${{ github.event.head_commit.timestamp || github.event.inputs.ref || 'nightly' }}
          prerelease: true
          files: docs/devportal-docs.tar.gz
          fail_on_unmatched_files: true

      - name: Attach to version release (tag push)
        if: steps.release-tag.outputs.prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: docs/devportal-docs.tar.gz
          fail_on_unmatched_files: true

      # ---- Notify DevPortal ----

      - name: Trigger devportal rebuild
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEVPORTAL_DISPATCH_TOKEN }}
          repository: algorandfoundation/devportal
          event-type: docs-published
          client-payload: |
            {
              "repo": "${{ github.repository }}",
              "tag": "${{ steps.release-tag.outputs.tag }}",
              "prerelease": "${{ steps.release-tag.outputs.prerelease }}"
            }
